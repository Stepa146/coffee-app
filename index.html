<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кофейня — Наше место</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f5f0eb;
            --card: #ffffff;
            --text: #1a1a1a;
            --text-muted: #8a8a8a;
            --accent: #c17f59;
            --accent-light: #e8d5c4;
            --accent-dark: #a06540;
            --badge: #c17f59;
            --badge-light: #e8d5c4;
            --success: #4a9e6b;
            --danger: #c94a4a;
            --border: rgba(0,0,0,0.06);
            --shadow: 0 2px 12px rgba(0,0,0,0.06);
            --shadow-lg: 0 8px 32px rgba(0,0,0,0.1);
            --radius: 16px;
            --radius-sm: 10px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ===== NAVIGATION ===== */
        .nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            background: rgba(245, 240, 235, 0.92);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            z-index: 100;
            padding: 0.5rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
        }
        .nav-brand {
            display: flex;
            flex-direction: column;
            line-height: 1.2;
        }
        .nav-brand-top {
            font-size: 1.125rem;
            font-weight: 800;
            color: var(--accent-dark);
            letter-spacing: -0.02em;
        }
        .nav-brand-bottom {
            font-size: 0.6875rem;
            font-weight: 500;
            color: var(--text-muted);
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }
        .nav-links {
            display: flex;
            gap: 0.5rem;
        }
        .nav-link {
            padding: 0.5rem 1rem;
            border-radius: 100px;
            font-size: 0.8125rem;
            font-weight: 500;
            color: var(--text-muted);
            background: none;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }
        .nav-link:hover { color: var(--text); }
        .nav-link.active {
            background: var(--accent);
            color: white;
        }
        .nav-cart {
            position: relative;
            padding: 0.5rem;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 100px;
            cursor: pointer;
            font-size: 1.125rem;
            transition: all 0.2s;
        }
        .nav-cart:hover { transform: scale(1.05); }
        .nav-cart-count {
            position: absolute;
            top: -4px; right: -4px;
            width: 18px; height: 18px;
            background: var(--badge);
            color: white;
            font-size: 0.625rem;
            font-weight: 700;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ===== PAGES ===== */
        .page {
            display: none;
            padding-top: 64px;
            min-height: 100vh;
        }
        .page.active { display: block; }

        /* ===== HERO ===== */
        .hero {
            padding: 2rem 1.5rem 1rem;
            text-align: center;
        }
        .hero h1 {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 0.25rem;
            letter-spacing: -0.03em;
        }
        .hero p {
            color: var(--text-muted);
            font-size: 0.9375rem;
        }

        /* ===== CATEGORIES ===== */
        .categories {
            display: flex;
            gap: 0.5rem;
            padding: 1rem 1.5rem;
            overflow-x: auto;
            scrollbar-width: none;
        }
        .categories::-webkit-scrollbar { display: none; }
        .cat-btn {
            padding: 0.625rem 1.25rem;
            border-radius: 100px;
            font-size: 0.8125rem;
            font-weight: 600;
            border: 1.5px solid var(--border);
            background: var(--card);
            color: var(--text-muted);
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .cat-btn:hover {
            border-color: var(--accent-light);
            color: var(--accent-dark);
        }
        .cat-btn.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        /* ===== PRODUCTS GRID ===== */
        .products {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 1rem;
            padding: 1rem 1.5rem 2rem;
        }
        .product-card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 1rem;
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
            border: 1px solid transparent;
            position: relative;
        }
        .product-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
            border-color: var(--accent-light);
        }
        .product-img {
            width: 100%;
            aspect-ratio: 1;
            background: linear-gradient(135deg, var(--accent-light), var(--bg));
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            margin-bottom: 0.75rem;
            position: relative;
        }
        /* BADGE на карточке товара — как на фото */
        .product-cart-badge {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 36px;
            height: 36px;
            background: var(--badge);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 16px rgba(193, 127, 89, 0.4);
            z-index: 2;
        }
        .product-cart-badge svg {
            width: 18px;
            height: 18px;
            fill: white;
        }
        .product-cart-badge-count {
            position: absolute;
            top: -6px;
            right: -6px;
            width: 20px;
            height: 20px;
            background: var(--accent-dark);
            color: white;
            font-size: 0.6875rem;
            font-weight: 800;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--badge);
        }
        .product-name {
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
        }
        .product-vol {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }
        .product-bottom {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .product-price {
            font-size: 0.9375rem;
            font-weight: 700;
            color: var(--accent-dark);
        }
        .product-add {
            width: 32px; height: 32px;
            border-radius: 50%;
            background: var(--accent);
            color: white;
            border: none;
            font-size: 1.125rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .product-add:hover { transform: scale(1.1); background: var(--accent-dark); }
        .product-qty {
            position: absolute;
            top: 0.5rem; right: 0.5rem;
            background: var(--badge);
            color: white;
            width: 24px; height: 24px;
            border-radius: 50%;
            font-size: 0.75rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ===== MODAL ===== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(8px);
            z-index: 200;
            display: none;
            align-items: flex-end;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .modal-overlay.show {
            display: flex;
            opacity: 1;
        }
        .modal {
            background: var(--card);
            width: 100%;
            max-width: 480px;
            max-height: 85vh;
            border-radius: var(--radius) var(--radius) 0 0;
            padding: 1.5rem;
            overflow-y: auto;
            transform: translateY(100%);
            transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
        }
        .modal-overlay.show .modal {
            transform: translateY(0);
        }
        .modal-close {
            position: absolute;
            top: 1rem; right: 1rem;
            width: 36px; height: 36px;
            border-radius: 50%;
            background: var(--bg);
            border: none;
            font-size: 1.25rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-img {
            width: 120px; height: 120px;
            background: linear-gradient(135deg, var(--accent-light), var(--bg));
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            margin: 0 auto 1rem;
        }
        .modal-title {
            font-size: 1.25rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 0.25rem;
        }
        .modal-desc {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.875rem;
            margin-bottom: 1.5rem;
        }
        .modal-section {
            margin-bottom: 1.25rem;
        }
        .modal-section-title {
            font-size: 0.8125rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.75rem;
        }
        .size-options {
            display: flex;
            gap: 0.5rem;
        }
        .size-btn {
            flex: 1;
            padding: 0.75rem;
            border-radius: var(--radius-sm);
            border: 1.5px solid var(--border);
            background: var(--card);
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
        }
        .size-btn:hover { border-color: var(--accent-light); }
        .size-btn.active {
            border-color: var(--accent);
            background: rgba(193,127,89,0.08);
        }
        .size-btn .size-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            display: block;
            margin-bottom: 0.25rem;
        }
        .size-btn .size-price {
            font-size: 0.875rem;
            font-weight: 700;
            color: var(--text);
        }
        .addons-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.5rem;
        }
        .addon-item {
            padding: 0.75rem;
            border-radius: var(--radius-sm);
            border: 1.5px solid var(--border);
            background: var(--card);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s;
            font-size: 0.8125rem;
        }
        .addon-item:hover { border-color: var(--accent-light); }
        .addon-item.selected {
            border-color: var(--accent);
            background: rgba(193,127,89,0.08);
        }
        .addon-item b { color: var(--accent); font-weight: 600; }
        .modal-footer {
            display: flex;
            gap: 1rem;
            align-items: center;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
        }
        .qty-control {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            background: var(--bg);
            border-radius: 100px;
            padding: 0.375rem;
        }
        .qty-btn {
            width: 32px; height: 32px;
            border-radius: 50%;
            background: var(--card);
            border: 1px solid var(--border);
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .qty-btn:hover { background: var(--accent-light); }
        .qty-value {
            font-size: 0.9375rem;
            font-weight: 700;
            min-width: 24px;
            text-align: center;
        }
        .modal-add-btn {
            flex: 1;
            padding: 0.875rem;
            border-radius: 100px;
            background: var(--accent);
            color: white;
            border: none;
            font-size: 0.9375rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .modal-add-btn:hover { background: var(--accent-dark); transform: translateY(-1px); }

        /* ===== CART PAGE ===== */
        .cart-page {
            padding: 1.5rem;
            max-width: 600px;
            margin: 0 auto;
        }
        .cart-title {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 1.5rem;
        }
        .cart-empty {
            text-align: center;
            padding: 4rem 1rem;
            color: var(--text-muted);
        }
        .cart-empty-icon { font-size: 3rem; margin-bottom: 1rem; }
        .cart-item {
            display: flex;
            gap: 1rem;
            padding: 1rem;
            background: var(--card);
            border-radius: var(--radius);
            margin-bottom: 0.75rem;
            box-shadow: var(--shadow);
        }
        .cart-item-img {
            width: 60px; height: 60px;
            background: linear-gradient(135deg, var(--accent-light), var(--bg));
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            flex-shrink: 0;
        }
        .cart-item-info { flex: 1; }
        .cart-item-name { font-weight: 600; font-size: 0.9375rem; margin-bottom: 0.125rem; }
        .cart-item-details { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 0.5rem; }
        .cart-item-price { font-weight: 700; color: var(--accent-dark); }
        .cart-item-actions {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .cart-item-remove {
            width: 28px; height: 28px;
            border-radius: 50%;
            background: none;
            border: 1px solid var(--border);
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.875rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .cart-item-remove:hover { color: var(--danger); border-color: var(--danger); }

        .cart-section {
            background: var(--card);
            border-radius: var(--radius);
            padding: 1.25rem;
            margin-bottom: 1rem;
            box-shadow: var(--shadow);
        }
        .cart-section-title {
            font-size: 0.875rem;
            font-weight: 700;
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
        }
        .delivery-options {
            display: flex;
            gap: 0.5rem;
        }
        .delivery-btn {
            flex: 1;
            padding: 0.875rem;
            border-radius: var(--radius-sm);
            border: 1.5px solid var(--border);
            background: var(--card);
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
            font-size: 0.8125rem;
        }
        .delivery-btn:hover { border-color: var(--accent-light); }
        .delivery-btn.active {
            border-color: var(--accent);
            background: rgba(193,127,89,0.08);
        }
        .delivery-btn .delivery-icon { font-size: 1.25rem; display: block; margin-bottom: 0.375rem; }
        .delivery-btn .delivery-label { font-weight: 600; }

        .comment-area {
            width: 100%;
            padding: 0.75rem;
            border-radius: var(--radius-sm);
            border: 1.5px solid var(--border);
            background: var(--bg);
            font-family: inherit;
            font-size: 0.875rem;
            resize: vertical;
            min-height: 80px;
        }
        .comment-area:focus {
            outline: none;
            border-color: var(--accent);
        }

        .cart-total {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.25rem;
            background: var(--card);
            border-radius: var(--radius);
            margin-bottom: 1rem;
            box-shadow: var(--shadow);
        }
        .cart-total-label { font-size: 0.9375rem; color: var(--text-muted); }
        .cart-total-value { font-size: 1.5rem; font-weight: 800; color: var(--accent-dark); }

        .submit-btn {
            width: 100%;
            padding: 1rem;
            border-radius: 100px;
            background: var(--accent);
            color: white;
            border: none;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 3rem;
        }
        .submit-btn:hover { background: var(--accent-dark); transform: translateY(-2px); box-shadow: var(--shadow-lg); }
        .submit-btn:disabled {
            background: var(--text-muted);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* ===== BARISTA PANEL ===== */
        .barista-page {
            padding: 1.5rem;
            max-width: 600px;
            margin: 0 auto;
        }
        .barista-title {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 0.25rem;
        }
        .barista-subtitle {
            color: var(--text-muted);
            font-size: 0.875rem;
            margin-bottom: 1.5rem;
        }
        .order-card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 1.25rem;
            margin-bottom: 1rem;
            box-shadow: var(--shadow);
            border-left: 4px solid var(--accent);
        }
        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
        }
        .order-time { font-family: monospace; font-size: 0.8125rem; color: var(--text-muted); }
        .order-type {
            padding: 0.25rem 0.75rem;
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 600;
            background: var(--accent-light);
            color: var(--accent-dark);
        }
        .order-items { margin-bottom: 0.75rem; }
        .order-item {
            padding: 0.375rem 0;
            font-size: 0.875rem;
            border-bottom: 1px solid var(--border);
        }
        .order-item:last-child { border-bottom: none; }
        .order-addon {
            font-size: 0.75rem;
            color: var(--text-muted);
            padding-left: 1rem;
        }
        .order-comment {
            font-size: 0.8125rem;
            color: var(--text-muted);
            font-style: italic;
            padding: 0.5rem;
            background: var(--bg);
            border-radius: var(--radius-sm);
            margin-bottom: 0.75rem;
        }
        .order-total {
            font-size: 1rem;
            font-weight: 700;
            color: var(--accent-dark);
            text-align: right;
        }
        .order-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.75rem;
        }
        .order-action-btn {
            flex: 1;
            padding: 0.625rem;
            border-radius: var(--radius-sm);
            border: 1.5px solid var(--border);
            background: var(--card);
            font-size: 0.8125rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .order-action-btn:hover { background: var(--bg); }
        .order-action-btn.complete {
            background: var(--success);
            color: white;
            border-color: var(--success);
        }
        .order-action-btn.complete:hover { background: #3d8a5a; }

        /* ===== TOAST ===== */
        .toast {
            position: fixed;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--text);
            color: white;
            padding: 0.875rem 1.5rem;
            border-radius: 100px;
            font-size: 0.875rem;
            font-weight: 500;
            z-index: 300;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.4,0,0.2,1);
            box-shadow: var(--shadow-lg);
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        
        /* ===== SEARCH BAR ===== */
        .search-bar {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            background: var(--card);
            border-radius: 100px;
            padding: 0.75rem 1.25rem;
            margin: 0 1.5rem 1rem;
            box-shadow: var(--shadow);
            border: 1.5px solid var(--border);
            transition: all 0.2s;
            max-width: 600px;
        }
        .search-bar:focus-within {
            border-color: var(--accent);
            box-shadow: 0 4px 16px rgba(193, 127, 89, 0.15);
        }
        .search-icon {
            width: 18px;
            height: 18px;
            color: var(--text-muted);
            flex-shrink: 0;
        }
        .search-input {
            flex: 1;
            border: none;
            background: none;
            font-family: inherit;
            font-size: 0.9375rem;
            color: var(--text);
            outline: none;
        }
        .search-input::placeholder {
            color: var(--text-muted);
        }

        @media (max-width: 480px) {
            .products { grid-template-columns: repeat(2, 1fr); gap: 0.75rem; padding: 0.75rem; }
            .nav { padding: 0.5rem 1rem; }
            .nav-brand-top { font-size: 1rem; }
            .nav-link { padding: 0.375rem 0.75rem; font-size: 0.75rem; }
            .hero h1 { font-size: 1.375rem; }
            .cart-page, .barista-page { padding: 1rem; }
        }
    </style>
<base target="_blank">
</head>
<body>
    <!-- NAVIGATION -->
    <nav class="nav">
        <div class="nav-brand">
            <div class="nav-brand-top">Кофейня</div>
            <div class="nav-brand-bottom">Наше место</div>
        </div>
        <div class="nav-links">
            <button class="nav-link active" onclick="switchPage('home')" data-page="home">Меню</button>
            <button class="nav-link" onclick="switchPage('cart')" data-page="cart">Корзина</button>
            <button class="nav-link" onclick="switchPage('barista')" data-page="barista">Бариста</button>
        </div>
        <button class="nav-cart" onclick="switchPage('cart')">
            🛒
            <span class="nav-cart-count" id="navCartCount" style="display:none">0</span>
        </button>
    </nav>

    <!-- TOAST -->
    <div class="toast" id="toast"></div>

    <!-- ===== HOME PAGE ===== -->
    <div class="page active" id="page-home">
        <div class="hero">
            <h1>Что будете заказывать?</h1>
            <p>Свежайший кофе и десерты</p>
        </div>
        
        <div class="search-bar">
            <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
            <input type="text" class="search-input" id="searchInput" placeholder="Поиск по меню..." oninput="searchProducts(this.value)">
        </div>

        <div class="categories" id="categories"></div>
        <div class="products" id="products"></div>
    </div>

    <!-- ===== CART PAGE ===== -->
    <div class="page" id="page-cart">
        <div class="cart-page">
            <h2 class="cart-title">Ваш заказ</h2>
            <div id="cartItems"></div>

            <div class="cart-section">
                <div class="cart-section-title">Способ получения</div>
                <div class="delivery-options">
                    <button class="delivery-btn active" id="delivery-pickup" onclick="setDelivery('pickup')">
                        <span class="delivery-icon">🚶</span>
                        <span class="delivery-label">Самовынос</span>
                    </button>
                    <button class="delivery-btn" id="delivery-spot" onclick="setDelivery('spot')">
                        <span class="delivery-icon">🚗</span>
                        <span class="delivery-label">До лавки</span>
                    </button>
                </div>
            </div>

            <div class="cart-section">
                <div class="cart-section-title">Комментарий</div>
                <textarea class="comment-area" id="orderComment" placeholder="Особые пожелания к заказу..."></textarea>
            </div>

            <div class="cart-total">
                <span class="cart-total-label">Итого</span>
                <span class="cart-total-value" id="cartTotal">0.00 Br</span>
            </div>
            <button class="submit-btn" id="submitBtn" onclick="submitOrder()">Оформить заказ</button>
        </div>
    </div>

    <!-- ===== BARISTA PAGE ===== -->
    <div class="page" id="page-barista">
        <div class="barista-page">
            <h2 class="barista-title">Панель бариста</h2>
            <p class="barista-subtitle">Входящие заказы</p>
            <div id="baristaOrders"></div>
        </div>
    </div>

    <!-- ===== PRODUCT MODAL ===== -->
    <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
        <div class="modal" onclick="event.stopPropagation()">
            <button class="modal-close" onclick="closeModal()">✕</button>
            <div class="modal-img" id="modalImg">☕</div>
            <div class="modal-title" id="modalTitle">Кофе</div>
            <div class="modal-desc" id="modalDesc">Описание</div>

            <div class="modal-section">
                <div class="modal-section-title">Объём</div>
                <div class="size-options" id="sizeOptions"></div>
            </div>

            <div class="modal-section">
                <div class="modal-section-title">Добавки</div>
                <div class="addons-grid" id="addonsGrid"></div>
            </div>

            <div class="modal-footer">
                <div class="qty-control">
                    <button class="qty-btn" onclick="changeQty(-1)">−</button>
                    <span class="qty-value" id="modalQty">1</span>
                    <button class="qty-btn" onclick="changeQty(1)">+</button>
                </div>
                <button class="modal-add-btn" id="modalAddBtn" onclick="addToCart()">Добавить</button>
            </div>
        </div>
    </div>

    <script>
        // ===== DATA — ВСЕ ПОЗИЦИИ =====
        const categories = [
            { id: 'all', name: 'Всё' },
            { id: 'coffee', name: 'Кофе' },
            { id: 'tea', name: 'Чай' },
            { id: 'dessert', name: 'Десерты' },
            { id: 'other', name: 'Другое' }
        ];

        const menu = [
            { id: 1, name: 'Эспрессо', category: 'coffee', icon: '☕', desc: 'Классический эспрессо', sizes: [{ vol: '30 мл', price: 3.50 }, { vol: '60 мл', price: 4.50 }] },
            { id: 2, name: 'Американо', category: 'coffee', icon: '☕', desc: 'Эспрессо с водой', sizes: [{ vol: '250 мл', price: 4.50 }, { vol: '400 мл', price: 5.50 }] },
            { id: 3, name: 'Капучино', category: 'coffee', icon: '🥛', desc: 'Эспрессо с молочной пенкой', sizes: [{ vol: '250 мл', price: 5.50 }, { vol: '400 мл', price: 6.50 }] },
            { id: 4, name: 'Латте', category: 'coffee', icon: '🥛', desc: 'Эспрессо с молоком', sizes: [{ vol: '300 мл', price: 6.00 }, { vol: '450 мл', price: 7.00 }] },
            { id: 5, name: 'Флэт Уайт', category: 'coffee', icon: '☕', desc: 'Двойной эспрессо с молоком', sizes: [{ vol: '200 мл', price: 6.50 }] },
            { id: 6, name: 'Раф', category: 'coffee', icon: '🍦', desc: 'Кофе со сливками и ванилью', sizes: [{ vol: '300 мл', price: 7.50 }, { vol: '450 мл', price: 8.50 }] },
            { id: 7, name: 'Макиато', category: 'coffee', icon: '☕', desc: 'Эспрессо с каплей молока', sizes: [{ vol: '60 мл', price: 4.00 }] },
            { id: 8, name: 'Мокко', category: 'coffee', icon: '🍫', desc: 'Кофе с шоколадом', sizes: [{ vol: '300 мл', price: 6.50 }, { vol: '450 мл', price: 7.50 }] },
            { id: 9, name: 'Гляссе', category: 'coffee', icon: '🍨', desc: 'Кофе с мороженым', sizes: [{ vol: '300 мл', price: 7.00 }] },
            { id: 10, name: 'Лунго', category: 'coffee', icon: '☕', desc: 'Длинный эспрессо', sizes: [{ vol: '90 мл', price: 4.00 }, { vol: '120 мл', price: 4.50 }] },
            { id: 11, name: 'Матча Латте', category: 'tea', icon: '🍵', desc: 'Зелёный чай матча с молоком', sizes: [{ vol: '300 мл', price: 7.00 }] },
            { id: 12, name: 'Чай Эрл Грей', category: 'tea', icon: '🫖', desc: 'Чёрный чай с бергамотом', sizes: [{ vol: '300 мл', price: 4.00 }] },
            { id: 13, name: 'Зелёный чай', category: 'tea', icon: '🍵', desc: 'Классический зелёный чай', sizes: [{ vol: '300 мл', price: 3.50 }] },
            { id: 14, name: 'Облепиховый чай', category: 'tea', icon: '🫖', desc: 'Чай с облепихой и мёдом', sizes: [{ vol: '350 мл', price: 5.00 }] },
            { id: 15, name: 'Тирамису', category: 'dessert', icon: '🍰', desc: 'Итальянский десерт', sizes: [{ vol: '150 г', price: 8.00 }] },
            { id: 16, name: 'Чизкейк', category: 'dessert', icon: '🍰', desc: 'Нью-Йорк чизкейк', sizes: [{ vol: '120 г', price: 7.50 }] },
            { id: 17, name: 'Медовик', category: 'dessert', icon: '🍰', desc: 'Классический медовый торт', sizes: [{ vol: '130 г', price: 6.50 }] },
            { id: 18, name: 'Эклер', category: 'dessert', icon: '🥮', desc: 'Заварное пирожное', sizes: [{ vol: '80 г', price: 4.50 }] },
            { id: 19, name: 'Макарон', category: 'dessert', icon: '🍪', desc: 'Французское миндальное печенье', sizes: [{ vol: '30 г', price: 3.00 }] },
            { id: 20, name: 'Круассан', category: 'other', icon: '🥐', desc: 'Сливочный круассан', sizes: [{ vol: '80 г', price: 4.00 }] },
            { id: 21, name: 'Смузи', category: 'other', icon: '🥤', desc: 'Фруктовый смузи', sizes: [{ vol: '300 мл', price: 6.00 }, { vol: '450 мл', price: 7.50 }] },
            { id: 22, name: 'Лимонад', category: 'other', icon: '🍋', desc: 'Домашний лимонад', sizes: [{ vol: '400 мл', price: 5.00 }] },
            { id: 23, name: 'Морс', category: 'other', icon: '🫐', desc: 'Ягодный морс', sizes: [{ vol: '300 мл', price: 4.00 }] },
            { id: 24, name: 'Горячий шоколад', category: 'other', icon: '🍫', desc: 'Классический горячий шоколад', sizes: [{ vol: '300 мл', price: 5.50 }] }
        ];

        const addonsList = [
            { id: 'syrup', name: 'Сироп', price: 1.00 },
            { id: 'whipped', name: 'Взбитые сливки', price: 1.50 },
            { id: 'caramel', name: 'Карамель', price: 1.00 },
            { id: 'chocolate', name: 'Шоколад', price: 1.00 },
            { id: 'cinnamon', name: 'Корица', price: 0.50 },
            { id: 'ice', name: 'Доп. лёд', price: 0.50 },
            { id: 'milk', name: 'Раст. молоко', price: 1.00 },
            { id: 'honey', name: 'Мёд', price: 0.75 }
        ];

        // ===== STATE =====
        let currentCategory = 'all';
        let cart = {};
        let orders = [];
        let selectedDelivery = 'pickup';
        let currentProduct = null;
        let currentSizeIdx = 0;
        let currentQty = 1;
        let selectedAddons = new Set();

        // ===== INIT =====
        
        function searchProducts(query) {
            const q = query.toLowerCase().trim();
            if (!q) {
                renderProducts();
                return;
            }
            const container = document.getElementById('products');
            const filtered = menu.filter(p => 
                p.name.toLowerCase().includes(q) || 
                p.desc.toLowerCase().includes(q) ||
                p.category.toLowerCase().includes(q)
            );
            if (filtered.length === 0) {
                container.innerHTML = `
                    <div style="grid-column: 1 / -1; text-align: center; padding: 3rem 1rem; color: var(--text-muted);">
                        <div style="font-size: 2.5rem; margin-bottom: 0.5rem;">🔍</div>
                        <p>Ничего не найдено</p>
                        <p style="font-size: 0.8125rem; margin-top: 0.25rem;">Попробуйте другой запрос</p>
                    </div>
                `;
                return;
            }
            container.innerHTML = filtered.map(product => {
                const cartQty = getProductCartQty(product.id);
                return `
                    <div class="product-card" onclick="openModal(${product.id})">
                        <div class="product-img">
                            ${product.icon}
                            ${cartQty > 0 ? `
                                <div class="product-cart-badge">
                                    <svg viewBox="0 0 24 24"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/></svg>
                                    <span class="product-cart-badge-count">${cartQty}</span>
                                </div>
                            ` : ''}
                        </div>
                        <div class="product-name">${product.name}</div>
                        <div class="product-vol">от ${product.sizes[0].vol}</div>
                        <div class="product-bottom">
                            <div class="product-price">${product.sizes[0].price.toFixed(2)} Br</div>
                            <button class="product-add" onclick="event.stopPropagation(); quickAdd(${product.id})">+</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function init() {
            renderCategories();
            renderProducts();
            renderAddons();
            updateCartUI();
        }

        // ===== CATEGORIES =====
        function renderCategories() {
            const container = document.getElementById('categories');
            container.innerHTML = categories.map(cat => `
                <button class="cat-btn ${cat.id === currentCategory ? 'active' : ''}" onclick="setCategory('${cat.id}')">${cat.name}</button>
            `).join('');
        }

        function setCategory(id) {
            currentCategory = id;
            renderCategories();
            renderProducts();
        }

        // ===== PRODUCTS =====
        function renderProducts() {
            const container = document.getElementById('products');
            const filtered = currentCategory === 'all' ? menu : menu.filter(p => p.category === currentCategory);
            container.innerHTML = filtered.map(product => {
                const cartQty = getProductCartQty(product.id);
                return `
                    <div class="product-card" onclick="openModal(${product.id})">
                        <div class="product-img">
                            ${product.icon}
                            ${cartQty > 0 ? `
                                <div class="product-cart-badge">
                                    <svg viewBox="0 0 24 24"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/></svg>
                                    <span class="product-cart-badge-count">${cartQty}</span>
                                </div>
                            ` : ''}
                        </div>
                        <div class="product-name">${product.name}</div>
                        <div class="product-vol">от ${product.sizes[0].vol}</div>
                        <div class="product-bottom">
                            <div class="product-price">${product.sizes[0].price.toFixed(2)} Br</div>
                            <button class="product-add" onclick="event.stopPropagation(); quickAdd(${product.id})">+</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function getProductCartQty(productId) {
            let qty = 0;
            Object.entries(cart).forEach(([key, item]) => {
                if (item.product.id === productId) qty += item.qty;
            });
            return qty;
        }

        function quickAdd(productId) {
            const product = menu.find(p => p.id === productId);
            const size = product.sizes[0];
            const key = `${productId}_${size.vol}_`;
            if (!cart[key]) cart[key] = { product, size, qty: 0, addons: [] };
            cart[key].qty++;
            updateCartUI();
            showToast(`${product.name} добавлен`);
            renderProducts();
        }

        // ===== MODAL =====
        function openModal(productId) {
            currentProduct = menu.find(p => p.id === productId);
            currentSizeIdx = 0;
            currentQty = 1;
            selectedAddons.clear();

            document.getElementById('modalImg').textContent = currentProduct.icon;
            document.getElementById('modalTitle').textContent = currentProduct.name;
            document.getElementById('modalDesc').textContent = currentProduct.desc;
            document.getElementById('modalQty').textContent = '1';

            document.getElementById('sizeOptions').innerHTML = currentProduct.sizes.map((s, i) => `
                <button class="size-btn ${i === 0 ? 'active' : ''}" onclick="selectSize(${i})">
                    <span class="size-label">${s.vol}</span>
                    <span class="size-price">${s.price.toFixed(2)} Br</span>
                </button>
            `).join('');

            renderAddons();
            updateModalTotal();

            document.getElementById('modalOverlay').classList.add('show');
            document.body.style.overflow = 'hidden';
        }

        function closeModal(e) {
            if (e && e.target !== e.currentTarget) return;
            document.getElementById('modalOverlay').classList.remove('show');
            document.body.style.overflow = '';
        }

        function selectSize(idx) {
            currentSizeIdx = idx;
            document.querySelectorAll('.size-btn').forEach((btn, i) => btn.classList.toggle('active', i === idx));
            updateModalTotal();
        }

        function renderAddons() {
            document.getElementById('addonsGrid').innerHTML = addonsList.map(addon => `
                <div class="addon-item ${selectedAddons.has(addon.id) ? 'selected' : ''}" onclick="toggleAddon('${addon.id}')">
                    <span>${addon.name}</span>
                    <b>+${addon.price.toFixed(2)} Br</b>
                </div>
            `).join('');
        }

        function toggleAddon(id) {
            selectedAddons.has(id) ? selectedAddons.delete(id) : selectedAddons.add(id);
            renderAddons();
            updateModalTotal();
        }

        function changeQty(delta) {
            currentQty = Math.max(1, currentQty + delta);
            document.getElementById('modalQty').textContent = currentQty;
            updateModalTotal();
        }

        function updateModalTotal() {
            const size = currentProduct.sizes[currentSizeIdx];
            let total = size.price * currentQty;
            selectedAddons.forEach(id => total += addonsList.find(a => a.id === id).price * currentQty);
            document.getElementById('modalAddBtn').textContent = `Добавить · ${total.toFixed(2)} Br`;
        }

        function addToCart() {
            const size = currentProduct.sizes[currentSizeIdx];
            const addonIds = Array.from(selectedAddons).sort();
            const key = `${currentProduct.id}_${size.vol}_${addonIds.join(',')}`;

            if (!cart[key]) cart[key] = { product: currentProduct, size, qty: 0, addons: addonIds.map(id => addonsList.find(a => a.id === id)) };
            cart[key].qty += currentQty;

            updateCartUI();
            closeModal();
            showToast(`${currentProduct.name} · ${currentQty} шт`);
            renderProducts();
        }

        // ===== CART =====
        function updateCartUI() {
            const totalQty = Object.values(cart).reduce((sum, item) => sum + item.qty, 0);
            const countEl = document.getElementById('navCartCount');
            countEl.textContent = totalQty;
            countEl.style.display = totalQty > 0 ? 'flex' : 'none';
            renderCartItems();
            updateCartTotal();
        }

        function renderCartItems() {
            const container = document.getElementById('cartItems');
            const items = Object.values(cart);

            if (items.length === 0) {
                container.innerHTML = `
                    <div class="cart-empty">
                        <div class="cart-empty-icon">🛒</div>
                        <p>Корзина пуста</p>
                        <p style="font-size: 0.8125rem; margin-top: 0.5rem;">Добавьте напитки из меню</p>
                    </div>
                `;
                document.getElementById('submitBtn').disabled = true;
                return;
            }

            document.getElementById('submitBtn').disabled = false;
            container.innerHTML = Object.entries(cart).map(([key, item]) => {
                const addonText = item.addons.length > 0 ? ` + ${item.addons.map(a => a.name).join(', ')}` : '';
                const itemTotal = (item.size.price + item.addons.reduce((s, a) => s + a.price, 0)) * item.qty;
                return `
                    <div class="cart-item">
                        <div class="cart-item-img">${item.product.icon}</div>
                        <div class="cart-item-info">
                            <div class="cart-item-name">${item.product.name}</div>
                            <div class="cart-item-details">${item.size.vol}${addonText}</div>
                            <div class="cart-item-price">${itemTotal.toFixed(2)} Br</div>
                        </div>
                        <div class="cart-item-actions">
                            <div class="qty-control">
                                <button class="qty-btn" onclick="changeCartQty('${key}', -1)">−</button>
                                <span class="qty-value">${item.qty}</span>
                                <button class="qty-btn" onclick="changeCartQty('${key}', 1)">+</button>
                            </div>
                            <button class="cart-item-remove" onclick="removeCartItem('${key}')">🗑</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function changeCartQty(key, delta) {
            if (!cart[key]) return;
            cart[key].qty = Math.max(1, cart[key].qty + delta);
            updateCartUI();
        }

        function removeCartItem(key) {
            delete cart[key];
            updateCartUI();
            showToast('Удалено из корзины');
        }

        function updateCartTotal() {
            const total = Object.values(cart).reduce((sum, item) => {
                const addonTotal = item.addons.reduce((s, a) => s + a.price, 0);
                return sum + (item.size.price + addonTotal) * item.qty;
            }, 0);
            document.getElementById('cartTotal').textContent = `${total.toFixed(2)} Br`;
        }

        function setDelivery(type) {
            selectedDelivery = type;
            document.getElementById('delivery-pickup').classList.toggle('active', type === 'pickup');
            document.getElementById('delivery-spot').classList.toggle('active', type === 'spot');
        }

        // ===== SUBMIT ORDER =====
        function submitOrder() {
            const items = Object.values(cart);
            if (items.length === 0) { showToast('Добавьте напитки в корзину!'); return; }

            const now = new Date();
            const order = {
                id: Date.now(),
                time: `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`,
                type: selectedDelivery,
                items: items.map(item => ({
                    name: item.product.name,
                    qty: item.qty,
                    size: item.size.vol,
                    price: item.size.price,
                    addons: item.addons
                })),
                comment: document.getElementById('orderComment').value,
                total: Object.values(cart).reduce((sum, item) => {
                    const addonTotal = item.addons.reduce((s, a) => s + a.price, 0);
                    return sum + (item.size.price + addonTotal) * item.qty;
                }, 0)
            };

            orders.push(order);
            cart = {};
            document.getElementById('orderComment').value = '';
            updateCartUI();
            renderProducts();
            renderBaristaOrders();
            showToast('Заказ отправлен!');
            switchPage('barista');
        }

        // ===== BARISTA =====
        function renderBaristaOrders() {
            const container = document.getElementById('baristaOrders');
            if (orders.length === 0) {
                container.innerHTML = `
                    <div class="cart-empty">
                        <div class="cart-empty-icon">📋</div>
                        <p>Нет активных заказов</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = orders.map((order, idx) => `
                <div class="order-card" id="order-${order.id}">
                    <div class="order-header">
                        <span class="order-time">${order.time}</span>
                        <span class="order-type">${order.type === 'pickup' ? '🚶 Самовынос' : '🚗 До лавки'}</span>
                    </div>
                    <div class="order-items">
                        ${order.items.map(item => `
                            <div class="order-item">${item.qty}x ${item.name} (${item.size}) — ${(item.price * item.qty).toFixed(2)} Br</div>
                            ${item.addons.map(a => `<div class="order-addon">+ ${a.name} — ${a.price.toFixed(2)} Br</div>`).join('')}
                        `).join('')}
                    </div>
                    ${order.comment ? `<div class="order-comment">💬 ${order.comment}</div>` : ''}
                    <div class="order-total">Итого: ${order.total.toFixed(2)} Br</div>
                    <div class="order-actions">
                        <button class="order-action-btn" onclick="removeOrder(${idx})">Отменить</button>
                        <button class="order-action-btn complete" onclick="completeOrder(${idx})">Готово ✓</button>
                    </div>
                </div>
            `).join('');
        }

        function completeOrder(idx) {
            orders.splice(idx, 1);
            renderBaristaOrders();
            showToast('Заказ выполнен!');
        }

        function removeOrder(idx) {
            orders.splice(idx, 1);
            renderBaristaOrders();
            showToast('Заказ отменён');
        }

        // ===== NAVIGATION =====
        function switchPage(page) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(`page-${page}`).classList.add('active');
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.querySelector(`.nav-link[data-page="${page}"]`)?.classList.add('active');
            window.scrollTo({ top: 0, behavior: 'smooth' });
            if (page === 'barista') renderBaristaOrders();
        }

        // ===== TOAST =====
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        // ===== START =====
        window.onload = init;
    </script>
</body>
</html>
